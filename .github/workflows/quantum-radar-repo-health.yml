name: Quantum Radar — Daily repo health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/quantum-radar
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: projects/quantum-radar/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure repo-health label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import requests
          import os

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/labels/repo-health"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          }
          r = requests.get(url, headers=headers, timeout=30)
          if r.status_code == 404:
              requests.post(
                  f"https://api.github.com/repos/{repo}/labels",
                  headers=headers,
                  json={"name": "repo-health", "color": "B60205", "description": "Automated repo health failures"},
                  timeout=30,
              )
          PY

      - name: Run repo checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MONITORED_REPOS_TOKEN: ${{ secrets.MONITORED_REPOS_TOKEN }}
        run: python scripts/check_repos.py

      - name: Publish to Jekyll collection
        run: python scripts/publish_to_jekyll.py repo-health

      - name: Commit updates
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "$(git status --porcelain -- projects/quantum-radar/reports projects/quantum-radar/state _quantum_radar)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/quantum-radar/reports projects/quantum-radar/state _quantum_radar
          git commit -m "chore(quantum-radar): update repo-health report"
          git push origin HEAD:${{ github.ref_name }}
